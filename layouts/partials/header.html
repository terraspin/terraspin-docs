<!-- Top metadata strip -->
<div class="topbar" data-od-id="topbar">
  <div class="container topbar-inner">
    <span><b>{{ .Site.Title }} / {{ now.Format "2006" }}</b></span>
    <span class="mid">
      <span>Filed under <b class="coral">Infrastructure · Automation</b></span>
      <span>Open Source · MIT</span>
    </span>
    <span class="right">
      <a class="topbar-link" href="{{ .Site.Params.githubRepo }}/releases" target="_blank" rel="noreferrer noopener">
        <span class="pulse"></span>Docs
      </a>
      <span><b>EN</b></span>
    </span>
  </div>
</div>

<!-- Sticky nav -->
<header class="nav" data-od-id="nav">
  <div class="container nav-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="brand">
      <img src="{{ "images/logo-200.png" | relURL }}" alt="{{ .Site.Title }} logo" class="brand-logo" width="36" height="36">
      <span>{{ .Site.Title }}</span>
      <span class="brand-meta"><b>Open Source</b>Infrastructure Automation</span>
    </a>
    <nav>
      <ul class="nav-links">
        <li><a href="{{ "docs/" | relURL }}">Docs</a></li>
        <li><a href="{{ "search/" | relURL }}">Search</a></li>
        <li><a href="{{ .Site.Params.githubRepo }}" target="_blank" rel="noreferrer noopener">GitHub<span class="num">↗</span></a></li>
      </ul>
    </nav>
    <div class="nav-side">
      {{ partial "theme-toggle.html" . }}
      <a class="nav-cta ghost" href="{{ .Site.Params.githubRepo }}/releases" target="_blank" rel="noreferrer noopener">Download</a>
      <a class="nav-cta" href="{{ .Site.Params.githubRepo }}" target="_blank" rel="noreferrer noopener" data-stars>Star</a>
      <span class="status-dot" aria-hidden="true"></span>
      <button class="mobile-toggle" aria-label="Menu" aria-expanded="false" id="mobile-toggle">
        <span class="dot-grid">
          <span class="d"></span><span class="d"></span>
          <span class="d"></span><span class="d"></span>
        </span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile menu -->
<div class="mobile-menu-overlay" id="mobile-overlay"></div>
<div class="mobile-menu" id="mobile-menu">
  <div class="mobile-menu-handle"></div>
  <ul class="mobile-nav-links">
    <li><a href="{{ "docs/" | relURL }}">Docs</a></li>
    <li><a href="{{ "search/" | relURL }}">Search</a></li>
    <li><a href="{{ .Site.Params.githubRepo }}" target="_blank" rel="noreferrer noopener">GitHub <span class="num">↗</span></a></li>
  </ul>
  <div class="mobile-menu-actions">
    <a class="nav-cta ghost" href="{{ .Site.Params.githubRepo }}/releases" target="_blank" rel="noreferrer noopener">Download</a>
    <a class="nav-cta" href="{{ .Site.Params.githubRepo }}" target="_blank" rel="noreferrer noopener" data-stars>Star</a>
  </div>
</div>

<script>
(function() {
  var toggle = document.getElementById('mobile-toggle');
  var menu = document.getElementById('mobile-menu');
  var overlay = document.getElementById('mobile-overlay');
  var body = document.body;
  var isOpen = false;

  function open() {
    isOpen = true;
    toggle.setAttribute('aria-expanded', 'true');
    menu.classList.add('is-open');
    overlay.classList.add('is-open');
    body.style.overflow = 'hidden';
  }

  function close() {
    isOpen = false;
    toggle.setAttribute('aria-expanded', 'false');
    menu.classList.remove('is-open');
    overlay.classList.remove('is-open');
    body.style.overflow = '';
  }

  toggle.addEventListener('click', function() {
    if (isOpen) close(); else open();
  });

  overlay.addEventListener('click', close);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isOpen) {
      close();
      toggle.focus();
    }
  });

  menu.querySelectorAll('a').forEach(function(link) {
    link.addEventListener('click', close);
  });
})();
</script>
