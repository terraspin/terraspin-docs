<nav class="docs-sidebar" data-od-id="sidebar">
  {{ $currentPage := . }}
  {{ $docs := .Site.GetPage "/docs" }}
  {{ range $docs.Sections.ByWeight }}
    <div class="sidebar-group">
      <a href="{{ .RelPermalink }}" class="sidebar-group-label {{ if eq $currentPage.RelPermalink .RelPermalink }}active{{ end }}">{{ .Title }}</a>
      {{ range .Pages.ByWeight }}
        <a href="{{ .RelPermalink }}" class="{{ if eq $currentPage.RelPermalink .RelPermalink }}active{{ end }}">
          {{ .Title }}
        </a>
      {{ end }}
    </div>
  {{ end }}
</nav>
